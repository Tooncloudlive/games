name: Scraping Automatico de Partidos, Escudos y Streams HLS

on:
  schedule:
    # Ejecutar 2 veces al dia: 06:00 UTC y 18:00 UTC
    # Esto cubre la madrugada y la tarde para capturar cambios en la programacion
    - cron: '0 6,18 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install npm dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run scraping + build
        run: npm run scrape:all
        env:
          CI: true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/
          if git diff --cached --quiet; then
            echo "No changes to commit - skipping commit"
          else
            git commit -m "Auto-update: scrape + build $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
