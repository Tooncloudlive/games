<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>VR Camera</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
  }
  /* Marco exterior simulando el visor VR */
  #vr-frame {
    width: 100vw;
    height: 100vh;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 14px;
    gap: 14px;
  }
  #container {
    display: flex;
    width: 100%;
    height: 100%;
    gap: 14px;
    align-items: center;
    justify-content: center;
  }
  .eye-panel {
    width: calc(50% - 7px);
    height: 96%;
    position: relative;
    overflow: hidden;
    background: #000;
  }
  /* Bordes curvos como lentes VR: exteriores más redondeados */
  .eye-panel.left {
    border-radius: 40px 20px 20px 40px;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
  }
  .eye-panel.right {
    border-radius: 20px 40px 40px 20px;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
  }
  /* Simulación sutil de borde de lente */
  .eye-panel::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    box-shadow: inset 0 0 40px 10px rgba(0,0,0,0.35);
    pointer-events: none;
    z-index: 2;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: inherit;
  }
  .label {
    position: absolute;
    top: 14px;
    color: rgba(255, 255, 255, 0.55);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    pointer-events: none;
    user-select: none;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    z-index: 3;
  }
  .left .label {
    left: 18px;
  }
  .right .label {
    right: 18px;
  }
  #error-msg {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: #000;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    text-align: center;
    padding: 20px;
    z-index: 10;
  }
  #error-msg.active {
    display: flex;
  }
  #error-msg h1 {
    font-size: 18px;
    margin-bottom: 12px;
    color: #ff453a;
  }
  #error-msg p {
    font-size: 15px;
    line-height: 1.5;
    opacity: 0.85;
    max-width: 320px;
  }
  #start-btn {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    z-index: 20;
  }
  #start-btn.hidden {
    display: none;
  }
  #start-btn button {
    background: #fff;
    color: #000;
    border: none;
    padding: 16px 32px;
    font-size: 16px;
    font-weight: 600;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  #cam-switch {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  #cam-switch.active {
    display: flex;
  }
  #cam-switch button {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 500;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 0.5px;
    min-width: 140px;
    text-align: center;
  }
  #cam-switch button:active {
    background: rgba(255, 255, 255, 0.28);
  }
  #cam-name {
    color: rgba(255, 255, 255, 0.9);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    background: rgba(0, 0, 0, 0.5);
    padding: 4px 14px;
    border-radius: 12px;
    backdrop-filter: blur(4px);
  }
  #cam-name.show {
    opacity: 1;
  }
</style>
<base target="_blank">
</head>
<body>

<div id="start-btn">
  <button onclick="startCamera()">Iniciar Cámara VR</button>
</div>

<div id="error-msg">
  <h1>Error de cámara</h1>
  <p id="error-text">No se pudo acceder a la cámara.</p>
</div>

<div id="vr-frame">
  <div id="container">
    <div class="eye-panel left">
      <video id="videoL" autoplay playsinline muted></video>
      <span class="label">L</span>
    </div>
    <div class="eye-panel right">
      <video id="videoR" autoplay playsinline muted></video>
      <span class="label">R</span>
    </div>
  </div>
</div>

<div id="cam-switch">
  <div id="cam-name"></div>
  <button onclick="switchCamera()">Cambiar cámara</button>
</div>

<script>
  const videoL = document.getElementById('videoL');
  const videoR = document.getElementById('videoR');
  const errorMsg = document.getElementById('error-msg');
  const errorText = document.getElementById('error-text');
  const startBtn = document.getElementById('start-btn');
  const camSwitch = document.getElementById('cam-switch');
  const camName = document.getElementById('cam-name');

  let stream = null;
  let videoDevices = [];
  let currentCamIndex = 0;
  let nameTimeout = null;

  async function startCamera() {
    startBtn.classList.add('hidden');

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' },
        audio: false
      });
    } catch (err) {
      showError(err);
      return;
    }

    videoL.srcObject = stream;
    videoR.srcObject = stream;
    try {
      await videoL.play();
      await videoR.play();
    } catch (e) { }

    await listCameras();

    if (videoDevices.length > 1) {
      camSwitch.classList.add('active');
      showCamName(videoDevices[currentCamIndex].label);
    }
  }

  async function listCameras() {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      let cams = devices.filter(d => d.kind === 'videoinput');
      cams.sort((a, b) => {
        const aBack = /back|trasera|rear|environment/i.test(a.label);
        const bBack = /back|trasera|rear|environment/i.test(b.label);
        return bBack - aBack;
      });
      videoDevices = cams;
      const currentTrack = stream.getVideoTracks()[0];
      const currentSettings = currentTrack.getSettings();
      if (currentSettings.deviceId) {
        const idx = videoDevices.findIndex(d => d.deviceId === currentSettings.deviceId);
        if (idx !== -1) currentCamIndex = idx;
      }
    } catch (err) {
      console.error('Error enumerando cámaras:', err);
    }
  }

  async function switchCamera() {
    if (videoDevices.length === 0) return;
    currentCamIndex = (currentCamIndex + 1) % videoDevices.length;
    const device = videoDevices[currentCamIndex];

    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { deviceId: { exact: device.deviceId } },
        audio: false
      });
    } catch (err) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { deviceId: device.deviceId },
          audio: false
        });
      } catch (err2) {
        showError(err2);
        return;
      }
    }

    videoL.srcObject = stream;
    videoR.srcObject = stream;
    try {
      await videoL.play();
      await videoR.play();
    } catch (e) { }

    showCamName(device.label || `Cámara ${currentCamIndex + 1}`);
  }

  function showCamName(name) {
    let display = name
      .replace(/\(.*\)/g, '')
      .replace(/Back\s*/i, '')
      .replace(/Camera/i, 'Cámara')
      .replace(/Dual/i, 'Doble')
      .replace(/Triple/i, 'Triple')
      .replace(/Ultra\s*Wide/i, 'Ultra Wide')
      .replace(/Wide/i, 'Wide')
      .replace(/Telephoto/i, 'Telefoto')
      .trim();

    if (!display || display.length < 2) {
      display = `Cámara ${currentCamIndex + 1}`;
    }

    camName.textContent = display;
    camName.classList.add('show');
    clearTimeout(nameTimeout);
    nameTimeout = setTimeout(() => {
      camName.classList.remove('show');
    }, 2000);
  }

  function showError(err) {
    let message = 'No se pudo acceder a la cámara.';
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      message = 'Permiso denegado. Por favor permite el acceso a la cámara en la configuración de tu navegador.';
    } else if (err.name === 'NotFoundError') {
      message = 'No se encontró la cámara seleccionada.';
    } else if (err.name === 'NotReadableError') {
      message = 'La cámara está siendo usada por otra aplicación.';
    } else if (err.name === 'OverconstrainedError') {
      message = 'La cámara no soporta la configuración solicitada.';
    } else if (err.message) {
      message = err.message;
    }
    errorText.textContent = message;
    errorMsg.classList.add('active');
  }

  window.addEventListener('beforeunload', () => {
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }
  });

  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('gesturechange', e => e.preventDefault());
  document.addEventListener('gestureend', e => e.preventDefault());
</script>

</body>
</html>
